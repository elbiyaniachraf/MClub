version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: mclub_postgres
    environment:
      POSTGRES_DB: mclub_db
      POSTGRES_USER: mclub_user
      POSTGRES_PASSWORD: mclub_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
