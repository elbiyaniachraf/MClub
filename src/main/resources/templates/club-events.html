<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{this :: content})}">

<div class="container mt-4" th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-1"><i class="bi bi-calendar-event text-warning"></i> Events</h2>
            <div class="text-muted" th:text="${club.name}">Club</div>
        </div>
        <a th:href="@{/clubs/{id}(id=${club.id})}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back to Club
        </a>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">Title</th>
                        <th>Date</th>
                        <th class="pe-4 text-end">Details</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="e : ${events}">
                        <td class="ps-4 fw-semibold" th:text="${e.title}">Title</td>
                        <td class="text-muted">
                            <span th:text="${#temporals.format(e.startDate, 'dd MMM yyyy HH:mm')}"></span>
                            <span class="mx-1">→</span>
                            <span th:text="${#temporals.format(e.endDate, 'dd MMM yyyy HH:mm')}"></span>
                        </td>
                        <td class="pe-4 text-end">
                            <a class="btn btn-outline-primary btn-sm" th:href="@{/events/{id}(id=${e.id})}">
                                View
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
                <div class="text-center text-muted p-4" th:if="${#lists.isEmpty(events)}">
                    No events yet.
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
