<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{this :: content})}">

<div class="container" th:fragment="content">
    <div class="row align-items-center mt-4 mb-3">
        <div class="col">
            <a class="text-decoration-none" th:href="${backUrl}">
                <i class="bi bi-arrow-left"></i> Back
            </a>
            <h2 class="display-6 mt-2">
                <i class="bi bi-chat-left-text"></i>
                <span th:text="${pageTitle}">Comments</span>
            </h2>
            <div class="text-muted" th:if="${pageSubtitle}">
                <span th:text="${pageSubtitle}">Target title</span>
            </div>
        </div>
    </div>

    <div th:if="${message}" class="alert alert-success border-0 shadow-sm" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger border-0 shadow-sm" th:text="${error}"></div>

    <div class="card border-0 shadow-sm rounded-4 mb-4" sec:authorize="hasRole('STUDENT')">
        <div class="card-body">
            <h5 class="card-title">Post a comment</h5>
            <form th:action="@{/comments/{targetType}/{targetId}(targetType=${targetType}, targetId=${targetId})}" method="post" th:object="${form}">
                <div class="mb-3">
                    <textarea class="form-control" rows="3" placeholder="Write a comment…" th:field="*{content}" required></textarea>
                </div>
                <button class="btn btn-primary rounded-pill px-4" type="submit">Post</button>
            </form>
        </div>
    </div>

    <!-- Recursive fragment to render a comment + its child replies -->
    <div th:fragment="commentNode(c, level)">
        <div th:if="${c == null}" class="text-muted small">[missing comment]</div>

        <div th:if="${c != null}"
             class="border rounded-3 p-3 mb-3 bg-white"
             th:with="lvl=${level == null ? 0 : level}"
             th:style="|margin-left:${#numbers.formatInteger(lvl,1)}em|">
            <!-- Using em instead of px and avoiding multiplication keeps Thymeleaf from throwing if types are weird -->

            <div class="d-flex justify-content-between align-items-start">
                <div class="fw-semibold"
                     th:text="${#strings.isEmpty(c.authorFullName) ? 'Unknown' : c.authorFullName}">User</div>
                <div class="text-muted small"
                     th:text="${c.createdAt != null ? #temporals.format(c.createdAt, 'dd MMM yyyy HH:mm') : ''}"></div>
            </div>

            <div class="mt-2" th:text="${c.content}">Comment body</div>

            <div class="mt-3" sec:authorize="hasRole('STUDENT')">
                <details>
                    <summary class="small text-muted" style="cursor:pointer;">Reply</summary>
                    <form class="mt-2"
                          th:action="@{/comments/{targetType}/{targetId}/{parentId}/reply(targetType=${targetType}, targetId=${targetId}, parentId=${c.id})}"
                          method="post">
                        <div class="mb-2">
                            <textarea class="form-control" name="content" rows="2" placeholder="Write a reply…" required></textarea>
                        </div>
                        <button class="btn btn-sm btn-outline-primary rounded-pill" type="submit">Post reply</button>
                    </form>
                </details>
            </div>
        </div>

        <div th:if="${c != null and c.replies != null and !#lists.isEmpty(c.replies)}">
            <div th:each="r : ${c.replies}">
                <div th:replace="~{this :: commentNode(c=${r}, level=${(level == null ? 0 : level) + 1})}"></div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body">
            <h5 class="card-title mb-3">All comments</h5>

            <div th:if="${#lists.isEmpty(comments)}" class="text-muted">No comments yet.</div>

            <div th:each="c : ${comments}">
                <div th:replace="~{this :: commentNode(c=${c}, level=${0})}"></div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
