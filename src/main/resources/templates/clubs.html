<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{::div[@class='container']})}">

<div class="container">
    <div class="row align-items-center mt-4 mb-3">
        <div class="col">
            <h2 class="display-6"><i class="bi bi-people-fill text-primary"></i> Clubs Collection</h2>
        </div>
        <div class="col-auto">
            <a class="btn btn-primary shadow-sm" th:href="@{/club-applications/apply}" sec:authorize="!hasRole('PLATFORM_ADMIN')">Apply to Start a Club</a>
            <a class="btn btn-success shadow-sm" th:href="@{/api/clubs}" sec:authorize="hasRole('PLATFORM_ADMIN')">Create Club (API)</a>
        </div>
    </div>

    <!-- Alert Messages (optional backend flash attributes) -->
    <div th:if="${message}" class="alert alert-success mt-2" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger mt-2" th:text="${error}"></div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="club : ${clubsPage.content}">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-header bg-primary text-white p-3">
                    <h5 class="card-title mb-0 text-truncate" th:text="${club.name}">Club Name</h5>
                </div>
                <div class="card-body">
                    <p class="card-text text-muted" th:text="${club.description}">Club description...</p>
                </div>
                <div class="card-footer bg-white border-0 d-flex justify-content-between p-3">
                    <button class="btn btn-outline-primary btn-sm rounded-pill px-3">View Details</button>
                    <form th:action="@{/memberships/club/{id}/join(id=${club.id})}" method="post" sec:authorize="isAuthenticated() and !hasRole('PLATFORM_ADMIN')">
                        <button type="submit" class="btn btn-success btn-sm rounded-pill px-3">Join Club</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12" th:if="${clubsPage.isEmpty()}">
            <div class="alert alert-info border-0 rounded-3 shadow-sm" role="alert">
                <h4 class="alert-heading">No clubs yet!</h4>
                <p>There are no clubs created at this moment. Please check back later.</p>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav aria-label="Clubs Pagination" class="mt-4" th:if="${clubsPage.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${clubsPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/clubs(page=${clubsPage.number - 1})}">Previous</a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, clubsPage.totalPages - 1)}"
                th:classappend="${clubsPage.number == i} ? 'active'">
                <a class="page-link" th:href="@{/clubs(page=${i})}" th:text="${i + 1}">1</a>
            </li>

            <li class="page-item" th:classappend="${clubsPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/clubs(page=${clubsPage.number + 1})}">Next</a>
            </li>
        </ul>
    </nav>

</div>

</body>
</html>
