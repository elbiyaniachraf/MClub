<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{this :: content})}">

<div class="container py-4" th:fragment="content">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
            <h3 class="mb-0" th:text="'Rate: ' + ${event.title}">Rate</h3>
            <div class="text-muted small">
                <span th:text="${#temporals.format(event.startDate, 'yyyy-MM-dd HH:mm')}">date</span>
                <span th:if="${event.location != null}" th:text="' • ' + ${event.location}"> • location</span>
            </div>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" th:href="@{/events/{id}(id=${event.id})}">Back to event</a>
            <a class="btn btn-outline-primary" th:href="@{/events/{id}/comments(id=${event.id})}">View comments</a>
        </div>
    </div>

    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <form th:action="@{/events/{id}/rate(id=${event.id})}" th:object="${form}" method="post">
                <div class="mb-3">
                    <label class="form-label">Your rating</label>
                    <select class="form-select" th:field="*{rating}" required>
                        <option value="5">5 - Excellent</option>
                        <option value="4">4 - Good</option>
                        <option value="3">3 - OK</option>
                        <option value="2">2 - Bad</option>
                        <option value="1">1 - Terrible</option>
                    </select>
                    <div class="form-text">You can rate only if you attended. Some events may allow rating only after they end.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Optional comment</label>
                    <textarea class="form-control" th:field="*{comment}" rows="4" maxlength="2000" placeholder="Share feedback (optional)"></textarea>
                </div>

                <div class="d-flex justify-content-end">
                    <button class="btn btn-warning" type="submit">Submit rating</button>
                </div>
            </form>
        </div>
    </div>

    <div class="mt-3" th:if="${myRating != null}">
        <div class="text-muted small">Your current rating:</div>
        <div class="fw-semibold" th:text="${myRating.rating} + ' / 5'">5 / 5</div>
        <div class="text-muted" th:if="${myRating.comment != null && !#strings.isEmpty(myRating.comment)}" th:text="myRating.comment"></div>
    </div>
</div>

</body>
</html>
