<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{this :: content})}">

<div class="container mt-4" th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-1"><i class="bi bi-people-fill text-primary"></i> Members</h2>
            <div class="text-muted" th:text="${club.name}">Club</div>
        </div>
        <a th:href="@{/clubs/{id}(id=${club.id})}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back to Club
        </a>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-0">
            <ul class="list-group list-group-flush">
                <li class="list-group-item d-flex justify-content-between align-items-center"
                    th:each="member : ${members}">
                    <div>
                        <div class="fw-semibold" th:text="${member.userFullName}">Member Name</div>
                        <div class="text-muted small" th:text="${member.role}">Role</div>
                    </div>
                </li>
                <li class="list-group-item text-center text-muted" th:if="${#lists.isEmpty(members)}">
                    No approved members yet.
                </li>
            </ul>
        </div>
    </div>
</div>

</body>
</html>
