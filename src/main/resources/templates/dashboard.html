<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MClub Dashboard</title>
</head>
<body>

<div th:replace="layout.html :: body(content=~{::div.container})">
    <div class="row mt-4">
        <div class="col-12 text-center mb-4">
            <h1 class="display-5">Welcome back, <span th:text="${username}">User</span>!</h1>
            <p class="lead text-muted">Manage your clubs, join events, and stay active.</p>
        </div>
    </div>

    <div class="row">
        <!-- Recent Clubs Panel -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">Recent Clubs</h5>
                </div>
                <div class="card-body p-0">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center" th:each="club : ${recentClubs}">
                            <div class="ms-2 me-auto">
                                <div class="fw-bold" th:text="${club.name}">Club Name</div>
                                <span class="text-muted small" th:text="${club.description}">Description</span>
                            </div>
                            <span class="badge bg-primary rounded-pill">View</span>
                        </li>
                        <li class="list-group-item text-center text-muted" th:if="${#lists.isEmpty(recentClubs)}">
                            No clubs found.
                        </li>
                    </ul>
                </div>
                <div class="card-footer bg-transparent border-top-0 d-grid">
                    <a th:href="@{/clubs}" class="btn btn-outline-success btn-sm">View All Clubs</a>
                </div>
            </div>
        </div>

        <!-- Recent Events Panel -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0">Upcoming Events</h5>
                </div>
                <div class="card-body p-0">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-start" th:each="event : ${recentEvents}">
                            <div class="ms-2 me-auto">
                                <div class="fw-bold" th:text="${event.title}">Event Title</div>
                                <div class="text-muted small">
                                    <i class="bi bi-calendar"></i> <span th:text="${#temporals.format(event.startDate, 'dd MMM yyyy HH:mm')}">Date</span>
                                    | <i class="bi bi-geo-alt"></i> <span th:text="${event.location}">Location</span>
                                </div>
                            </div>
                        </li>
                        <li class="list-group-item text-center text-muted" th:if="${#lists.isEmpty(recentEvents)}">
                            No events found.
                        </li>
                    </ul>
                </div>
                <div class="card-footer bg-transparent border-top-0 d-grid">
                    <a th:href="@{/events}" class="btn btn-outline-warning btn-sm">Explore More Events</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
