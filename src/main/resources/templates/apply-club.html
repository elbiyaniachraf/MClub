<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{::div})}">

<div class="container">
    <div class="row mt-5 justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white p-4">
                    <h4 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Apply to Start a New Club</h4>
                </div>
                <div class="card-body p-4">
                    <div class="alert alert-info py-3 mb-4" role="alert">
                        <i class="bi bi-info-circle-fill me-2"></i>
                        All club applications will be reviewed by the school administration before approval.
                    </div>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/club-applications/submit}" method="post">
                        <div class="mb-4">
                            <label for="name" class="form-label fw-bold">Proposed Club Name</label>
                            <input type="text" class="form-control bg-light py-2" id="name" name="name"
                                   placeholder="e.g. Debate Club" required>
                        </div>
                        <div class="mb-4">
                            <label for="description" class="form-label fw-bold">Club Description</label>
                            <textarea class="form-control bg-light" id="description" name="description" rows="5"
                                      placeholder="Describe the club's activities, goals, and why it should be created..."
                                      required></textarea>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/clubs}" class="btn btn-outline-secondary px-4 py-2">Cancel</a>
                            <button type="submit" class="btn btn-primary px-4 py-2 shadow-sm">Submit Application</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
