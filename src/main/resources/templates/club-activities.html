<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body th:replace="~{layout :: body(content=~{this :: content})}">

<div class="container mt-4" th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="mb-1"><i class="bi bi-lightning-charge text-info"></i> Activities</h2>
            <div class="text-muted" th:text="${club.name}">Club</div>
        </div>
        <a th:href="@{/clubs/{id}(id=${club.id})}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Back to Club
        </a>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">Title</th>
                        <th>Date</th>
                        <th>Linked event</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a : ${activities}">
                        <td class="ps-4 fw-semibold" th:text="${a.title}">Title</td>
                        <td class="text-muted" th:text="${#temporals.format(a.date, 'dd MMM yyyy HH:mm')}"></td>
                        <td>
                            <a th:if="${a.eventId != null}" class="btn btn-outline-primary btn-sm"
                               th:href="@{/events/{id}(id=${a.eventId})}">View event</a>
                            <span class="text-muted" th:if="${a.eventId == null}">—</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
                <div class="text-center text-muted p-4" th:if="${#lists.isEmpty(activities)}">
                    No activities yet.
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
