spring:
  application:
    name: MClub
  datasource:
    url: jdbc:postgresql://localhost:5432/mclub_db
    username: mclub_user
    password: mclub_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      # Avoid 'Failed to validate connection (This connection has been closed.)' by proactively
      # keeping idle connections alive and recycling them before DB/network timeouts.
      keepalive-time: 300000     # 5 minutes
      max-lifetime: 1200000      # 20 minutes
      idle-timeout: 600000       # 10 minutes

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:

        jdbc:
          time_zone: UTC
        format_sql: true
    show-sql: false

  # ── Flyway ──
  flyway:
    issuer-uri: http://localhost:8080
    jwk-set-uri: http://localhost:8080/oauth/v2/keys
  docker:
    compose:
      enabled: false
      file: compose.yaml
server:
  port: 8080

mclub:
  ai:
    openai:
      enabled: true
      base-url: https://api.openai.com
      api-key: ${OPENAI_API_KEY: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}
      model: gpt-4o-mini
      timeout-ms: 15000

    vector:
      enabled: true
      backfill-enabled: false
      backfill:
        initial-delay-ms: 30000
        fixed-delay-ms: 3600000

    embedding:
      inmemory:
        enabled: false

  whatsapp:
    linking:
      rate-limit:
        redis-enabled: false
      attempts:
        redis-enabled: false

    meta:
      enabled: false
      base-url: https://graph.facebook.com
      api-version: v20.0
      phone-number-id: ${META_WA_PHONE_NUMBER_ID:}
      access-token: ${META_WA_ACCESS_TOKEN:}
      verify-token: ${META_WA_VERIFY_TOKEN:}
      app-secret: ${META_WA_APP_SECRET:}
      signature-verification:
        enabled: true
      otp-template-name: mclub_link_otp
      template-language: en_US

app:
